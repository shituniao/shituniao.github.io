<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Emscripten-Generated Code</title>
    <style>
      body {
        font-family: arial;
        margin: 0;
        padding: none;
        background-color: #111111;
        color: #fff;
      }
      .emscripten {
        padding-right: 0;
        margin-left: auto;
        margin-right: auto;
        display: block;
      }
      div.emscripten {
        text-align: center;
        background-color: #111111;
      }
      div.emscripten_border {
        border: 1px solid #333;
        background-color: #111111;
      }
      canvas.emscripten {
        border: 0 none;
        background-color: #000;
      }
      #emscripten_logo {
        display: inline-block;
        margin: 0;
        padding: 6px;
        width: 265px;
      }
      .spinner {
        height: 30px;
        width: 30px;
        margin: 0;
        margin-top: 20px;
        margin-left: 20px;
        display: inline-block;
        vertical-align: top;
        -webkit-animation: rotation .8s linear infinite;
        -moz-animation: rotation .8s linear infinite;
        -o-animation: rotation .8s linear infinite;
        animation: rotation .8s linear infinite;
        border-left: 5px solid #ebebeb;
        border-right: 5px solid #ebebeb;
        border-bottom: 5px solid #ebebeb;
        border-top: 5px solid #787878;
        border-radius: 100%;
        background-color: #bdd72e;
      }
      @-webkit-keyframes rotation {
        from { -webkit-transform: rotate(0) }
        to { -webkit-transform: rotate(360deg) }
      }
      @-moz-keyframes rotation {
        from { -moz-transform: rotate(0) }
        to { -moz-transform: rotate(360deg) }
      }
      @-o-keyframes rotation {
        from { -o-transform: rotate(0) }
        to { -o-transform: rotate(360deg) }
      }
      @keyframes rotation {
        from { transform: rotate(0) }
        to { transform: rotate(360deg) }
      }
      #status {
        display: inline-block;
        vertical-align: top;
        margin-top: 10px;
        margin-left: 20px;
        font-weight: 700;
        color: #787878;
      }
      #progress {
        height: 20px;
        width: 300px;
      }
      #controls {
        display: inline-block;
        float: right;
        vertical-align: top;
        margin-top: 30px;
        margin-right: 20px;
      }
      #output {
        width: calc(100% - 30px);
        height: auto;
        margin: 10px 15px 0 15px;
        border: 1px solid #444;
        padding-left: 0;
        padding-right: 0;
        display: block;
        background-color: #111111;
        color: #fff;
        font-family: Lucida Console, Monaco, monospace;
        outline: 0;
      }
    </style>
  </head>
  <body>
    <!--HEADER_START-->
    <div style="background:#111;padding:6px 10px 4px">
      <div style="text-align:center;font-size:20px;font-weight:bold;color:#ccc;font-family:Arial,sans-serif;padding-top:10px;padding-bottom:4px">TITLE_PLACEHOLDER</div>
      <div style="display:flex;justify-content:center;margin-top:10px">
        <a href="../../index.html" style="background:#333;color:#aaa;padding:4px 12px;text-decoration:none;font-family:Arial,sans-serif;font-size:13px">&#8592; 返回首页</a>
      </div>
    </div>
    <!--HEADER_END-->

    <div class="spinner" id='spinner'></div>
    <div class="emscripten" id="status">Downloading...</div>

    <div class="emscripten">
      <progress value="0" max="100" id="progress" hidden=1></progress>
    </div>

    <div class="emscripten_border">
      <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
    </div>
    <textarea id="output" rows="30"></textarea>

    <script type='text/javascript'>
      var statusElement = document.getElementById('status');
      var progressElement = document.getElementById('progress');
      var spinnerElement = document.getElementById('spinner');
      var canvasElement = document.getElementById('canvas');
      var outputElement = document.getElementById('output');
      if (outputElement) outputElement.value = '';

      canvasElement.addEventListener('webglcontextlost', (e) => {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
      }, false);

      var Module = {
        print(...args) {
          console.log(...args);
          if (outputElement) {
            var text = args.join(' ');
            outputElement.value += text + "\n";
            outputElement.scrollTop = outputElement.scrollHeight;
          }
        },
        canvas: canvasElement,
        setStatus(text) {
          if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
          if (text === Module.setStatus.last.text) return;
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (m && now - Module.setStatus.last.time < 30) return;
          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) {
            text = m[1];
            progressElement.value = parseInt(m[2])*100;
            progressElement.max = parseInt(m[4])*100;
            progressElement.hidden = false;
            spinnerElement.hidden = false;
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
            if (!text) spinnerElement.style.display = 'none';
          }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      Module.setStatus('Downloading...');
      window.onerror = (event) => {
        Module.setStatus('Exception thrown, see JavaScript console');
        spinnerElement.style.display = 'none';
        Module.setStatus = (text) => {
          if (text) console.error('[post-exception status] ' + text);
        };
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
